<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>诗词库整理平台</title>
  <link rel="stylesheet" href="assets/app.css">
</head>

<body>
  <header class="topbar">
    <h1>诗词库整理平台</h1>
    <div class="topbar-center"><img src="assets/logo.png" class="topbar-logo" alt="logo" onerror="this.src='/logo.png'"></div>
    <div id="userBar" class="small"></div>
  </header>
  <main class="container">
    <div class="entry-row">
      <div id="adminEntry" class="card entry-card" style="display:none;">
        <a href="admin.html" class="link">用户管理</a>
      </div>
      <div id="tutorialEntry" class="card entry-card">
        <a href="tutorial.html" class="link">教程与设置</a>
      </div>
    </div>
    <div class="home-grid">
      <section class="card home-card">
        <div class="card-head">
          <div class="card-title">诗词（W）</div>
          <div class="actions-row">
            <button data-type="W" class="btn small add">新建</button>
            <button data-type="W" class="btn small view">浏览</button>
          </div>
        </div>
      </section>
      <section class="card home-card">
        <div class="card-head">
          <div class="card-title">文集（G）</div>
          <div class="actions-row">
            <button data-type="G" class="btn small add">新建</button>
            <button data-type="G" class="btn small view">浏览</button>
          </div>
        </div>
      </section>
      <section class="card home-card">
        <div class="card-head">
          <div class="card-title">人物（C）</div>
          <div class="actions-row">
            <button data-type="C" class="btn small add">新建</button>
            <button data-type="C" class="btn small view">浏览</button>
          </div>
        </div>
      </section>
      <section class="card home-card">
        <div class="card-head">
          <div class="card-title">典故（E）</div>
          <div class="actions-row">
            <button data-type="E" class="btn small add">新建</button>
            <button data-type="E" class="btn small view">浏览</button>
          </div>
        </div>
      </section>
      <section class="card home-card">
        <div class="card-head">
          <div class="card-title">尔雅（S）</div>
          <div class="actions-row">
            <button data-type="S" class="btn small add">新建</button>
            <button data-type="S" class="btn small view">浏览</button>
          </div>
        </div>
      </section>
      <section class="card home-card">
        <div class="card-head">
          <div class="card-title">格律（L）</div>
          <div class="actions-row">
            <button data-type="L" class="btn small add">新建</button>
            <button data-type="L" class="btn small view">浏览</button>
          </div>
        </div>
      </section>
      <section class="card home-card home-card-full">
        <div class="card-head">
          <div class="card-title">汇总</div>
          <div class="actions-row">
            <button data-type="A" class="btn small add">新建</button>
            <button data-type="A" class="btn small view">浏览</button>
          </div>
        </div>
      </section>
    </div>
    <section class="card home-pending" id="myPendingSection">
      <div class="card-head">
        <div class="card-title">需关注条目</div>
        <div id="myPendingPagination" class="pagination-bar"></div>
        <span id="myPendingSummary" class="small muted">加载中</span>
      </div>
      <div class="table-wrapper">
        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>名称</th>
              <th>创建者</th>
              <th>创建日期</th>
              <th>审核者</th>
              <th>时长</th>
              <th>审核状态</th>
              <th>返修状态</th>
              <th class="actions-col">操作</th>
            </tr>
          </thead>
          <tbody id="myPendingBody"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script defer src="assets/common.js"></script>
  <script defer src="assets/home.js"></script>
</body>

</html>
