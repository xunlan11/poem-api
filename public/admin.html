<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>用户管理</title>
  <link rel="stylesheet" href="assets/app.css">
</head>

<body>
  <header class="topbar">
    <h1>用户管理</h1>
    <div class="topbar-center"><img src="assets/logo.png" class="topbar-logo" alt="logo" onerror="this.src='/logo.png'"></div>
    <a href="./" class="link">首页</a>
  </header>
  <main class="container">
    <section class="card">
      <div class="actions">
        <input id="userSearch" class="search" placeholder="按实名或完整学号搜索">
        <span id="userCount" class="list-count">共 0 人</span>
      </div>
      <div id="userPagination" class="pagination-bar"></div>
      <table class="table user-table">
        <colgroup>
          <col class="col-id">
          <col class="col-username">
          <col class="col-role">
          <col class="col-realname">
          <col class="col-student">
          <col class="col-actions">
        </colgroup>
        <thead>
          <tr>
            <th>ID</th>
            <th>用户名</th>
            <th>角色</th>
            <th>实名</th>
            <th>学号</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </section>
  </main>
  <script src="assets/common.js"></script>
  <script>
    (async function () {
      const me = await Poem.me();
      if (!me) { 
        location.href = 'login.html'; 
        return; 
      }
      if (me.role !== 'admin') { 
        Poem.toast('需管理员权限'); 
        location.href = './'; 
        return; 
      }
      const tb = document.getElementById('tbody');
      const searchInput = document.getElementById('userSearch');
      const paginationEl = document.getElementById('userPagination');
      const countEl = document.getElementById('userCount');
      const PAGE_SIZE = 15;
      const ROLE_LABELS = { user: '整理员', reviewer: '审核员', admin: '管理员' };
      // 角色标签配色：复用节点类别 ID 的背景色
      // 管理员 -> 尔雅（S）；审核员 -> 典故（E）；整理员 -> 诗词（W）
      const ROLE_CLASSES = { user: 'type-tag type-W', reviewer: 'type-tag type-E', admin: 'type-tag type-S' };
      let allUsers = [];
      let filteredUsers = [];
      let currentPage = 1;

      function sortUsers(list) {
        return list.sort((a, b) => {
          const pa = parseInt(String(a.id).split('_')[1] || '0', 10);
          const pb = parseInt(String(b.id).split('_')[1] || '0', 10);
          if (!isNaN(pa) && !isNaN(pb)) return pa - pb;
          return String(a.id).localeCompare(String(b.id));
        });
      }

      function filterUsers() {
        const q = (searchInput && searchInput.value ? searchInput.value : '').trim().toLowerCase();
        const base = allUsers.slice();
        if (!q) return sortUsers(base);
        return sortUsers(base.filter(u => {
          const rn = (u.real_name || '').toLowerCase();
          const sid = (u.student_id || '').toLowerCase();
          return (rn && rn.includes(q)) || (sid && sid === q);
        }));
      }

      function updateCountDisplay(total) {
        if (!countEl) return;
        const safeTotal = typeof total === 'number' && !isNaN(total) ? total : 0;
        countEl.textContent = `共 ${safeTotal} 人`;
      }

      function renderRow(u) {
        const tr = document.createElement('tr');
        const roleOptions = ['user', 'reviewer', 'admin'];
        let actions = '';
        if (u.id === 'u_1') {
          actions = '<span class="text-muted">超级管理员</span>';
        } else if (u.id === me.id) {
          actions = '<span class="text-muted">当前用户</span>';
        } else {
          const otherRoles = roleOptions.filter(r => r !== u.role);
          const roleButtons = otherRoles.map(r => {
            const label = ROLE_LABELS[r] || r;
            return `<button class='btn small' data-id='${u.id}' data-act='role' data-role='${r}'>${label}</button>`;
          }).join('');
          actions = `${roleButtons}<button class='btn small danger' data-id='${u.id}' data-act='delete'>删除</button>`;
        }
        const roleLabel = ROLE_LABELS[u.role] || u.role || '';
        const roleClass = ROLE_CLASSES[u.role] || '';
        const roleHtml = `<td><span class="${roleClass}">${roleLabel}</span></td>`;
        const actionsHtml = `<td class="actions-cell"><div class="actions-row">${actions}</div></td>`;
        tr.innerHTML = `<td>${u.id}</td><td>${u.username}</td>${roleHtml}<td>${u.real_name || ''}</td><td>${u.student_id || ''}</td>${actionsHtml}`;
        return tr;
      }

      function renderPagination(totalCount, totalPages) {
        if (!paginationEl) return;
        paginationEl.innerHTML = '';
        if (countEl) {
          countEl.classList.add('pagination-count');
          paginationEl.appendChild(countEl);
        }
        if (!totalCount) {
          const empty = document.createElement('span');
          empty.className = 'pagination-info';
          empty.textContent = '暂无用户';
          paginationEl.appendChild(empty);
          return;
        }
        const prevBtn = document.createElement('button');
        prevBtn.className = 'btn small';
        prevBtn.type = 'button';
        prevBtn.textContent = '◀';
        prevBtn.disabled = currentPage <= 1;
        prevBtn.addEventListener('click', () => {
          if (currentPage > 1) {
            currentPage -= 1;
            renderCurrentPage();
          }
        });
        const nextBtn = document.createElement('button');
        nextBtn.className = 'btn small';
        nextBtn.type = 'button';
        nextBtn.textContent = '▶';
        nextBtn.disabled = currentPage >= totalPages;
        nextBtn.addEventListener('click', () => {
          if (currentPage < totalPages) {
            currentPage += 1;
            renderCurrentPage();
          }
        });
        const info = document.createElement('span');
        info.className = 'pagination-info';
        const input = document.createElement('input');
        input.type = 'number';
        input.className = 'pagination-input';
        input.min = '1';
        input.max = String(totalPages);
        input.value = String(currentPage);
        input.title = '输入页码后按回车';
        input.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') {
            event.preventDefault();
            const target = parseInt(input.value, 10);
            if (!isNaN(target)) {
              goToPage(target);
            }
          }
        });
        input.addEventListener('blur', () => { input.value = String(currentPage); });
        info.textContent = '第 ';
        info.appendChild(input);
        const totalSpan = document.createElement('span');
        totalSpan.textContent = ` / ${totalPages} 页`;
        info.appendChild(totalSpan);
        paginationEl.appendChild(prevBtn);
        paginationEl.appendChild(info);
        paginationEl.appendChild(nextBtn);
      }

      function goToPage(page) {
        const totalPages = filteredUsers.length ? Math.ceil(filteredUsers.length / PAGE_SIZE) : 1;
        const parsed = parseInt(page, 10);
        const target = Math.max(1, Math.min(Number.isNaN(parsed) ? currentPage : parsed, totalPages));
        if (target === currentPage) return;
        currentPage = target;
        renderCurrentPage();
      }

      function renderCurrentPage(options = {}) {
        const { resetPage = false } = options;
        filteredUsers = filterUsers();
        const total = filteredUsers.length;
        const totalPages = total ? Math.ceil(total / PAGE_SIZE) : 1;
        if (resetPage) currentPage = 1;
        if (currentPage < 1) currentPage = 1;
        if (currentPage > totalPages) currentPage = totalPages;
        const start = total ? (currentPage - 1) * PAGE_SIZE : 0;
        const pageItems = filteredUsers.slice(start, start + PAGE_SIZE);
        tb.innerHTML = '';
        pageItems.forEach(u => { tb.appendChild(renderRow(u)); });
        updateCountDisplay(total);
        renderPagination(total, totalPages);
      }

      const refreshUsers = async ({ resetPage = false } = {}) => {
        allUsers = await Poem.api('/api/users');
        renderCurrentPage({ resetPage });
      };
      let searchTimer = null;
      searchInput.addEventListener('input', () => {
        if (searchTimer) clearTimeout(searchTimer);
        searchTimer = setTimeout(() => { renderCurrentPage({ resetPage: true }); }, 250);
      });
      searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          renderCurrentPage({ resetPage: true });
        }
      });
      tb.addEventListener('click', async (e) => {
        const btn = e.target.closest('button'); if (!btn) return;
        const id = btn.getAttribute('data-id'); const act = btn.getAttribute('data-act');
        const targetRole = btn.getAttribute('data-role') || '';
        const user = allUsers.find(u => u.id === id);
        if (!user) return;
        let confirmMsg = '';
        if (act === 'delete') confirmMsg = `删除用户 ${user.username} ？`;
        if (act === 'role') {
          const label = ROLE_LABELS[targetRole] || targetRole;
          confirmMsg = `将用户 ${user.username} 设置为 ${label} ？`;
        }
        if (confirmMsg && !confirm(confirmMsg)) return;
        try {
          if (act === 'delete') {
            await Poem.api(`/api/users/${id}`, { method: 'DELETE' });
          }
          if (act === 'role') {
            await Poem.api(`/api/users/${id}/role`, { method: 'PATCH', body: JSON.stringify({ role: targetRole }) });
          }
          await refreshUsers();
          Poem.toast('操作成功');
        } catch (e) {
          console.error('操作失败:', e);
          Poem.toast(e.message || '操作失败');
        }
      });
      refreshUsers({ resetPage: true });
    })();
  </script>
</body>

</html>
