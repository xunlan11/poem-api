<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>登录测试</title>
</head>
<body>
    <h1>登录测试</h1>
    <div>
        <label>用户名: <input id="username" value="testuser2"></label><br><br>
        <label>密码: <input id="password" type="password" value="test123"></label><br><br>
        <button id="loginBtn">登录</button>
    </div>
    <div id="result" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc;"></div>

    <script>
    const resultDiv = document.getElementById('result');
    
    function log(msg) {
        console.log(msg);
        resultDiv.innerHTML += '<div>' + new Date().toLocaleTimeString() + ': ' + msg + '</div>';
    }
    
    document.getElementById('loginBtn').onclick = async () => {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        
        resultDiv.innerHTML = '';
        log('开始登录测试...');
        log('用户名: ' + username);
        
        try {
            // 直接调用登录接口
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });
            
            log('HTTP状态码: ' + response.status);
            
            if (!response.ok) {
                const errorText = await response.text();
                log('错误响应: ' + errorText);
                throw new Error('HTTP ' + response.status);
            }
            
            const loginResult = await response.json();
            log('登录成功: ' + JSON.stringify(loginResult));
            
            // 测试获取用户信息
            const meResponse = await fetch('/api/auth/me');
            log('获取用户信息状态码: ' + meResponse.status);
            
            if (meResponse.ok) {
                const meResult = await meResponse.json();
                log('用户信息: ' + JSON.stringify(meResult));
            } else {
                log('获取用户信息失败');
            }
            
        } catch (error) {
            log('登录失败: ' + error.message);
            console.error('详细错误:', error);
        }
    };
    </script>
</body>
</html>
